<script>AOS.init();</script>

<script>
// Typing Animation
const text = ["Rust Backend Developer","MongoDB Specialist","React Developer, and more..."];
let i=0,j=0,current="",isDeleting=false;
function type(){
  current=text[i];
  document.querySelector(".typing").textContent=current.substring(0,j);
  if(!isDeleting && j<current.length) j++;
  else if(isDeleting && j>0) j--;
  else{
    isDeleting=!isDeleting;
    if(!isDeleting) i=(i+1)%text.length;
  }
  setTimeout(type,100);
}
type();

// Skill Animation
window.addEventListener("scroll",()=>{
  document.querySelectorAll(".progress div").forEach(bar=>{
    bar.style.width=bar.getAttribute("data-width");
  });
});

// Dark Light Toggle
function toggleMode(){
  document.body.classList.toggle("light");

  const icon = document.getElementById("theme-icon");

  if(document.body.classList.contains("light")){
    icon.textContent = "☀";
  } else {
    icon.textContent = "🌙";
  }
}

// Simple Particles
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<80;i++){
  particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2});
}
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,2*Math.PI);
    ctx.fillStyle="#38bdf8";
    ctx.fill();
    p.y+=0.5;
    if(p.y>canvas.height)p.y=0;
  });
  requestAnimationFrame(draw);
}
draw();
</script>
